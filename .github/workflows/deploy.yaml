name: Deploy app

on:
  push:
    branches:
      - master
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSH_USER: ${{ secrets.USER }}
      APP_PATH: ${{ secrets.APP_PATH }}
    steps:
      - name: Set deployment target
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "DEPLOY_TARGET=${APP_PATH}/prod/kod-proteinfold" >> "${GITHUB_ENV}"
            echo "DEPLOY_LABEL=production" >> "${GITHUB_ENV}"
            echo "DEPLOY_REF=refs/tags/${{ github.event.release.tag_name }}" >> "${GITHUB_ENV}"
          else
            echo "DEPLOY_TARGET=${APP_PATH}/dev" >> "${GITHUB_ENV}"
            echo "DEPLOY_LABEL=development" >> "${GITHUB_ENV}"
            echo "DEPLOY_REF=origin/master" >> "${GITHUB_ENV}"
          fi

      - name: Validate deployment inputs
        run: |
          for required in SSH_HOST SSH_USER APP_PATH DEPLOY_TARGET DEPLOY_REF; do
            if [ -z "${!required:-}" ]; then
              echo "Missing required value: ${required}" >&2
              exit 1
            fi
          done

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -p 22 "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy Git revision
        run: |
          deploy_command=$(printf 'ood-proteinfold-deploy %q %q' "${DEPLOY_TARGET}" "${DEPLOY_REF}")
          ssh "${SSH_USER}@${SSH_HOST}" "${deploy_command}"

      - name: Report deployment target
        run: |
          echo "Deployed ${DEPLOY_LABEL} (${DEPLOY_REF}) to ${DEPLOY_TARGET}"
